<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Power Engineering (2)</title>
    <meta name="description" content="Electrical Power Engineering Department - Second Year Portal.">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d233a; --primary-light: #1a365d; --accent-color: #b38f4d; --text-dark: #2d3748; --bg-gradient: linear-gradient(135deg, #f6f9fc 0%, #edf2f7 100%); --card-bg: #ffffff; --success: #38a169; --danger: #e53e3e; --border-radius: 12px; --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-dark); min-height: 100vh; display: flex; flex-direction: column; }
        .premium-header { background: linear-gradient(135deg, var(--primary-color) 0%, #061324 100%); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--accent-color); }
        .header-logo { width: 60px; height: 60px; }
        .header-logo img { width: 100%; height: 100%; object-fit: contain; }
        .view-section { display: none; padding: 20px; }
        .view-section.active { display: block; }
        .auth-container { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: var(--shadow); }
        .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .premium-btn { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #eee; text-align: right; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <header class="premium-header">
        <div class="header-logo"><img src="eng-1.jpg" alt="Logo"></div>
        <div style="text-align:center;"><h2>Electrical Power Engineering (2)</h2></div>
        <div class="header-logo"><img src="IMG_20260602_173903.jpg" alt="Logo"></div>
    </header>

    <section id="view-login" class="view-section active">
        <div class="auth-container">
            <h3>تسجيل الدخول</h3>
            <form id="login-form" onsubmit="handleLogin(event)">
                <input type="text" id="login-code" class="form-control" placeholder="الكود الجامعي" required>
                <input type="password" id="login-password" class="form-control" placeholder="كلمة السر" required>
                <button type="submit" class="premium-btn">دخول</button>
            </form>
            <p style="text-align:center; margin-top:10px;"><a onclick="switchView('view-register')" style="cursor:pointer; color:var(--accent-color);">إنشاء حساب</a></p>
        </div>
    </section>

    <section id="view-register" class="view-section">
        <div class="auth-container">
            <h3>إنشاء حساب</h3>
            <form id="register-form" onsubmit="handleRegister(event)">
                <input type="text" id="reg-name" class="form-control" placeholder="الاسم" required>
                <input type="text" id="reg-code" class="form-control" placeholder="الكود الجامعي" required>
                <input type="password" id="reg-password" class="form-control" placeholder="كلمة السر" required>
                <button type="submit" class="premium-btn">تسجيل</button>
            </form>
            <p style="text-align:center; margin-top:10px;"><a onclick="switchView('view-login')" style="cursor:pointer; color:var(--accent-color);">رجوع</a></p>
        </div>
    </section>

    <section id="view-student-dash" class="view-section">
        <h3>مرحباً بك</h3>
        <div id="courses-container" style="margin-top:20px;"></div>
    </section>

    <section id="view-admin-dash" class="view-section">
        <button class="premium-btn" onclick="switchView('view-login')">خروج</button>
        <table class="admin-table" style="margin-top:20px;">
            <thead><tr><th>الاسم</th><th>الكود</th><th>إجراء</th></tr></thead>
            <tbody id="admin-students-tbody"></tbody>
        </table>
    </section>

    <div id="modal-edit-grades" class="modal-overlay">
        <div class="modal-box">
            <form onsubmit="saveStudentGrades(event)">
                <input type="hidden" id="edit-grade-student-code">
                <input type="number" id="input-mid" class="form-control" placeholder="Midterm">
                <button type="submit" class="premium-btn">حفظ</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBfFmwd6XXPZrpPJRIzWYToLifc4-eTlf8",
          authDomain: "qenaeng-8e015.firebaseapp.com",
          databaseURL: "https://qenaeng-8e015-default-rtdb.firebaseio.com",
          projectId: "qenaeng-8e015",
          storageBucket: "qenaeng-8e015.firebasestorage.app",
          messagingSenderId: "111166173456",
          appId: "1:111166173456:web:666c3295f8ab101df0f595"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let state = { students: [], courses: [] };

        onValue(ref(db, 'students'), (snapshot) => { state.students = snapshot.val() || []; });
        onValue(ref(db, 'courses'), (snapshot) => { state.courses = snapshot.val() || []; });

        window.switchView = function(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        window.handleLogin = function(event) {
            event.preventDefault();
            const code = document.getElementById('login-code').value.trim();
            const pass = document.getElementById('login-password').value;

            if (code === "202414152" && pass === "HaNdSa16##2023") {
                window.renderAdminStudentsTable();
                window.switchView('view-admin-dash');
            } else {
                const student = state.students.find(s => s.code === code && s.password === pass);
                if (student) { window.switchView('view-student-dash'); } 
                else { alert('خطأ في البيانات'); }
            }
        }

        window.handleRegister = function(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const code = document.getElementById('reg-code').value.trim();
            const password = document.getElementById('reg-password').value;

            if (state.students.some(s => s.code === code)) { alert('مسجل مسبقاً'); return; }
            state.students.push({ name, code, password, grades: {} });
            set(ref(db, 'students'), state.students);
            alert('تم التسجيل!');
            window.switchView('view-login');
        }

        window.renderAdminStudentsTable = function() {
            const tbody = document.getElementById('admin-students-tbody');
            tbody.innerHTML = '';
            state.students.forEach(s => {
                tbody.innerHTML += `<tr><td>${s.name}</td><td>${s.code}</td><td><button onclick="openModal('modal-edit-grades')">رصد</button></td></tr>`;
            });
        }
        
        window.openModal = function(id) { document.getElementById(id).classList.add('active'); }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
